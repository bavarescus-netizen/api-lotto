<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTOAI PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .card.main { border-color: var(--blue); box-shadow: 0 0 10px rgba(88, 166, 255, 0.2); }
        .card img { width: 45px; height: 45px; }
        .card b { display: block; font-size: 13px; margin: 5px 0; }
        .card small { color: var(--blue); font-size: 11px; }
        
        .audit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .audit-item { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 5px; text-align: center; cursor: pointer; }
        .audit-item.win { border-color: var(--green); background: #0e2a14; }
        .audit-item.fail { border-color: var(--red); background: #2a0e0e; }
        .audit-item img { width: 30px; }
        
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-entrenar { background: #1f6feb; }
        .btn-stats { background: #8957e5; }
    </style>
</head>
<body>

    <h3 style="margin:0 0 15px 0;">EFECTIVIDAD: <span style="color:var(--blue)">{{ efectividad }}%</span></h3>

    <div class="grid-3">
        {% for a in top3 %}
        <div class="card {% if loop.index == 1 %}main{% endif %}">
            <img src="/imagenes/{{ a.imagen }}">
            <b>{{ a.animal }}</b>
            <small>{{ a.porcentaje }}</small>
        </div>
        {% endfor %}
    </div>

    <div style="font-size: 12px; margin-bottom: 8px;">AUDITORÍA (Marcar resultados de hoy)</div>
    <div class="audit-grid">
        {% for item in ultimos_db %}
        <div class="audit-item {% if item.acierto == True %}win{% elif item.acierto == False %}fail{% endif %}" 
             onclick="this.classList.toggle('win')">
            <div style="font-size: 8px;">{{ item.hora }}</div>
            <img src="/imagenes/{{ item.img }}">
        </div>
        {% endfor %}
    </div>

    <button class="btn btn-entrenar" onclick="accion('/procesar')">🧠 ENTRENAR IA</button>
    <button class="btn btn-stats" onclick="accion('/stats')">📊 VER ESTADÍSTICAS</button>

    <script>
        async function accion(url) {
            const res = await fetch(url);
            const data = await res.json();
            alert(data.message || "Proceso completado");
            if(url === '/procesar') location.reload();
        }
    </script>
</body>
</html>
