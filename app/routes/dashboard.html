<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto AI | Quantum Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #020617; color: #e2e8f0; }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.3); }
        .consola-scrollbar::-webkit-scrollbar { width: 4px; }
        .consola-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .pixel-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="min-h-screen pixel-grid p-4 lg:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">
                NEURAL ENGINE <span class="text-xs border border-blue-500 px-2 py-0.5 ml-2 rounded text-blue-400">V4.5 PRO</span>
            </h1>
            <p class="text-[10px] text-slate-500 uppercase mt-1">Sincronización Cuántica: 2018-2026</p>
        </div>
        <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-800/50 flex flex-col items-end">
            <span class="text-[10px] text-blue-400 font-bold uppercase">Efectividad Global</span>
            <span id="global-efectividad" class="text-2xl font-black text-white">0%</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-8">
            <div class="bg-slate-900/80 p-6 rounded-2xl neon-border relative backdrop-blur-sm">
                <h2 class="text-xs font-bold text-blue-400 mb-8 uppercase tracking-widest border-l-2 border-blue-500 pl-3">Top Predicción Hora</h2>
                <div id="radar-results" class="space-y-4">
                    <p class="text-center py-10 text-slate-600 italic">Listo para escanear...</p>
                </div>
                <button onclick="escanearProximaHora()" id="btn-escanear" class="w-full mt-8 py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl transition-all shadow-lg active:scale-95">
                    ESCANEAR PRÓXIMA HORA
                </button>
            </div>

            <div class="bg-black/90 rounded-2xl border border-slate-800 p-5 font-mono shadow-2xl">
                <div id="consola-logs" class="h-48 overflow-y-auto text-[11px] space-y-2 consola-scrollbar">
                    <p class="text-slate-500">> Núcleo listo. Esperando comando...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800/50 backdrop-blur-sm">
                    <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest text-center">Frecuencia Histórica</h3>
                    <div class="h-64 relative">
                        <canvas id="chartFrecuencia"></canvas>
                    </div>
                </div>

                <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800/50 backdrop-blur-sm flex flex-col min-h-[350px]">
                    <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">Métricas de Verdad</h3>
                    <div id="mini-logs-auditoria" class="flex-grow space-y-3 overflow-y-auto consola-scrollbar pr-2 text-[11px]">
                        <p class="text-slate-600 text-center py-20 italic">No hay datos de calibración.</p>
                    </div>
                    <button onclick="recalibrar()" id="btn-recalibrar" class="mt-6 w-full py-3 bg-slate-800/50 hover:bg-slate-700 text-blue-400 text-[11px] font-bold rounded-xl border border-blue-500/20 transition-all">
                        RE-CALIBRAR CEREBRO
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let myChart = null;

        // LOGS EN PANTALLA
        function log(msg, color = "text-slate-500") {
            const c = document.getElementById('consola-logs');
            c.innerHTML += `<p class="${color}">> ${msg}</p>`;
            c.scrollTop = c.scrollHeight;
        }

        // CARGAR ESTADÍSTICAS (PIDE DATOS A NEON)
        async function cargarStats() {
            log("Sincronizando con Neon...", "text-cyan-400");
            try {
                // Intentamos con la ruta absoluta para evitar errores de render
                const res = await fetch(window.location.origin + '/api/stats/');
                const result = await res.json();
                
                if (result.status === 'success' && result.data) {
                    log("Datos de frecuencia recibidos.", "text-green-400");
                    dibujarGrafica(result.data);
                    
                    if(result.logs_recientes) {
                        const cont = document.getElementById('mini-logs-auditoria');
                        cont.innerHTML = result.logs_recientes.map(l => `
                            <div class="flex justify-between p-2 bg-slate-800/40 rounded border-l-2 ${l.acierto ? 'border-green-500' : 'border-red-500'}">
                                <span>${l.hora} - ${l.animal}</span>
                                <span class="${l.acierto ? 'text-green-400' : 'text-red-400'}">${l.acierto ? 'ACI' : 'FAL'}</span>
                            </div>
                        `).join('');
                    }
                } else {
                    log("Servidor respondió sin datos.", "text-yellow-500");
                }
            } catch (e) {
                log("ERROR CONEXIÓN STATS: " + e.message, "text-red-500");
            }
        }

        function dibujarGrafica(data) {
            const ctx = document.getElementById('chartFrecuencia').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                        x: { ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        async function escanearProximaHora() {
            log("Iniciando escaneo neural...", "text-blue-400");
            try {
                const res = await fetch('/api/prediccion/');
                const data = await res.json();
                if (data.top3) {
                    document.getElementById('radar-results').innerHTML = data.top3.map(item => `
                        <div class="bg-slate-800/40 p-4 rounded-xl flex justify-between items-center border border-slate-700/50">
                            <span class="font-bold text-white uppercase italic">${item.animal}</span>
                            <span class="text-blue-400 font-black">${item.porcentaje}</span>
                        </div>
                    `).join('');
                    log("Patrones identificados.", "text-green-400");
                }
            } catch (e) { log("Error escaneo: " + e.message, "text-red-500"); }
        }

        async function recalibrar() {
            log("Cruzando predicciones con histórico...", "text-cyan-400");
            try {
                const res = await fetch('/entrenar/procesar');
                const data = await res.json();
                log("Calibración terminada: " + data.mensaje, "text-green-400");
                cargarStats();
            } catch (e) { log("Error calibración", "text-red-500"); }
        }

        window.onload = cargarStats;
    </script>
</body>
</html>
