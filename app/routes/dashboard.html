<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Lotto Pro</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#00eaff;
  --text:#e2e8f0;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

nav{
  display:flex;
  gap:10px;
  padding:10px;
  background:#020617;
}

nav button{
  padding:10px;
  background:var(--card);
  border:none;
  color:white;
  cursor:pointer;
}

nav button.active{
  background:var(--accent);
  color:black;
}

.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  z-index:999;
}

.toast.ok{ background:green; }
.toast.error{ background:red; }

</style>
</head>

<body>

<nav>
  <button data-tab="dashboard" class="active">Dashboard</button>
  <button data-tab="predicciones">Predicciones</button>
</nav>

<div id="dashboard" class="page active">
  <div class="card">
    <h3>Estado del sistema</h3>
    <div id="estado">Cargando...</div>
    <button data-action="refresh">Actualizar</button>
  </div>

  <div class="card">
    <h3>Motor Markov</h3>
    <button data-action="fixMarkov">Corregir</button>
  </div>
</div>

<div id="predicciones" class="page">
  <div class="card">
    <h3>Predicciones</h3>
    <div id="prediccionesList">Cargando...</div>
  </div>
</div>

<script>

// ==========================
// INIT
// ==========================

document.addEventListener("DOMContentLoaded", () => {
  initApp();
});

function initApp(){
  initTabs();
  startIntervals();
  cargarDatos();
}

// ==========================
// TABS
// ==========================

function initTabs(){
  document.querySelectorAll('nav button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');

      cargarDatos();
    });
  });
}

function getActivePage(){
  return document.querySelector('.page.active');
}

// ==========================
// API
// ==========================

async function apiFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    return await res.json();

  } catch (err) {
    console.error(err);
    showToast('Error conexión', 'error');
    return null;
  }
}

// ==========================
// DATA LOAD
// ==========================

async function cargarDatos(){
  const page = getActivePage();
  if(!page) return;

  if(page.id === "dashboard"){
    const data = await apiFetch('/estado');
    if(data) renderEstado(data);
  }

  if(page.id === "predicciones"){
    const data = await apiFetch('/predicciones');
    if(data) renderPredicciones(data);
  }
}

// ==========================
// RENDER
// ==========================

function renderEstado(data){
  document.getElementById('estado').textContent =
    JSON.stringify(data, null, 2);
}

function renderPredicciones(data){
  const cont = document.getElementById('prediccionesList');

  cont.innerHTML = data.map(p =>
    `<div class="card">${p.numero} - ${p.probabilidad}%</div>`
  ).join('');
}

// ==========================
// ACTIONS
// ==========================

async function fixMarkovDirecto(){
  showToast('Corrigiendo...');

  const res = await apiFetch('/fix-markov', { method:'POST' });

  if(res){
    showToast('Corrección aplicada');
    cargarDatos();
  }
}

// ==========================
// EVENTS GLOBAL
// ==========================

document.addEventListener('click', (e) => {
  const action = e.target.dataset.action;

  if (!action) return;

  switch(action){
    case 'refresh':
      cargarDatos();
      break;

    case 'fixMarkov':
      fixMarkovDirecto();
      break;
  }
});

// ==========================
// INTERVAL CONTROL
// ==========================

let intervals = [];

function startIntervals(){
  stopIntervals();

  intervals.push(setInterval(keepAlive, 120000));
  intervals.push(setInterval(cargarDatos, 180000));
}

function stopIntervals(){
  intervals.forEach(clearInterval);
  intervals = [];
}

document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    stopIntervals();
  } else {
    startIntervals();
  }
});

// ==========================
// KEEP ALIVE
// ==========================

async function keepAlive(){
  await fetch('/ping').catch(()=>{});
}

// ==========================
// UI
// ==========================

function showToast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;

  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 3000);
}

</script>

</body>
</html>
