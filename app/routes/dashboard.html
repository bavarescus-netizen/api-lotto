<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTOAI PRO - Venezuela</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-bg: #151b23;
            --primary-blue: #007bff;
            --success-green: #28a745;
            --fail-red: #dc3545;
            --text-gray: #8b949e;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .logo {
            font-weight: bold;
            font-size: 24px;
        }

        .logo span { color: var(--primary-blue); }

        .btn-venezuela {
            background-color: var(--primary-blue);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .status-ok { color: var(--success-green); }
        .status-info { color: #00d4ff; }

        /* Botones de Acción */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .btn-sync { background-color: var(--primary-blue); color: white; }
        .btn-train { background-color: var(--success-green); color: white; }
